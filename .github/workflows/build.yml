name: Build APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
      KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      # Build Signed Release APK (Gradle handles signing via env vars configured in build.gradle.kts)
      - name: Build Signed Release APK
        run: ./gradlew assembleRelease --stacktrace

      # Upload signed Release APK as artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AuraLearning.APK
          path: app/build/outputs/apk/release/app-release.apk
